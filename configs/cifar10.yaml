# ── Dataset ───────────────────────────────────────────────────────────────────
dataset: CIFAR10        # "CIFAR10" | "CIFAR100"
data_root: ./data

# Checkpoints — override via CLI when running on Colab with Google Drive:
#   python train.py --config configs/cifar10.yaml \
#                   --checkpoint-dir /content/drive/MyDrive/master_thesis/checkpoints
checkpoint_dir: ./checkpoints

# ── Training hyper-parameters ─────────────────────────────────────────────────
batch_size: 128
num_epochs: 100
lr: 0.1
momentum: 0.9
weight_decay: 5.0e-4
lr_milestones: [50, 75]
lr_gamma: 0.1
seed: 42

# ── Unlearning ────────────────────────────────────────────────────────────────
# forget_strategy: "random"  → forget a random fraction of train set
#                  "class"   → forget all samples of a given class
forget_strategy: random
forget_fraction: 0.01   # fraction of train set  (active when strategy=random)
forget_class: 0         # class index to forget   (active when strategy=class)

# ── SISA parameters ──────────────────────────────────────────────────────────
sisa_shards: 5          # number of disjoint data shards (S)
sisa_slices: 10         # number of sequential slices per shard (R)
sisa_aggregation: soft_vote   # "soft_vote" | "majority_vote"

# ── ∇τ Gradient-based Unlearning ─────────────────────────────────────────────
# Paper: arxiv.org/abs/2403.14339 — Trippa et al., 2024
#
# Loss: L = α·ReLU(L_Dv − L_Df)² + (1−α)·L_Dr
#   L_Df  = batch loss on forget set  (gradient ascent / unlearning)
#   L_Dr  = batch loss on retain set  (gradient descent / preservation)
#   L_Dv  = mean loss on validation set (adaptive target)
#   α     = balance weight, linearly decayed to 0 over all steps
#
# Rule of thumb (paper §6.4): α_init ≈ (5/3) × |D_f|/|D_train|
# For forget_fraction=0.10 → α≈0.17; for 0.30 → α≈0.50
grad_tau_forget_epochs: 10       # number of "forget-set epochs" to run unlearning
                                  # paper uses ~1/10 of pre-training epochs
grad_tau_alpha: 0.5              # initial α (decayed linearly to 0 over all steps)
grad_tau_lr: 1.0e-4              # AdamW learning rate for the unlearning optimizer
grad_tau_weight_decay: 1.0e-4   # AdamW weight decay
grad_tau_val_fraction: 0.1      # fraction of retain set held out as validation
grad_tau_recompute_val_every: 1  # recompute L_Dv every N forget-epochs (c in paper)
